{% extends "auctions/layout.html" %}
{# login.html — Formulario de login com mensagem de erro e link para cadastro. #}

{% block body %}
    <div class="auth-container">
        <h2 class="page-title">Entrar</h2>

        <div class="form-card">
            {% if message %}
                <div class="alert-neon error">{{ message }}</div>
            {% endif %}

            <form action="{% url 'login' %}" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input autofocus class="input-neon" type="text" name="username" id="username" placeholder="Digite seu usuario">
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input class="input-neon" type="password" name="password" id="password" placeholder="Digite sua senha">
                </div>
                <button type="submit" class="btn-neon" style="width:100%;padding:0.8rem;">Entrar</button>
            </form>
        </div>

        <div class="auth-link">
            Nao tem uma conta? <a href="{% url 'register' %}">Cadastre-se aqui.</a>
        </div>
    </div>
{% endblock %}
